name: Build Installers (Windows + Mac)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.1.0)'
        required: true
        default: '1.1.0'
      publish:
        description: 'Publish to public releases repo'
        type: boolean
        required: true
        default: true

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

      - name: Build Mac .pkg
        env:
          VERSION: ${{ github.event.inputs.version }}
          APPLE_DEVELOPER_ID_INSTALLER: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x installers/mac/build-pkg.sh
          bash installers/mac/build-pkg.sh

      - name: Upload Mac installer
        uses: actions/upload-artifact@v4
        with:
          name: LogoDeclinaisons-${{ github.event.inputs.version }}-mac
          path: dist/*.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows .exe
        run: iscc /DMyAppVersion=${{ github.event.inputs.version }} installer.iss
        shell: cmd

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: LogoDeclinaisons-${{ github.event.inputs.version }}-windows
          path: dist/*.exe

  publish-release:
    needs: [build-mac, build-windows]
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: LogoDeclinaisons-${{ github.event.inputs.version }}-mac
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LogoDeclinaisons-${{ github.event.inputs.version }}-windows
          path: artifacts/windows

      - name: List artifacts
        run: ls -la artifacts/mac artifacts/windows

      - name: Publish to public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          RELEASES_REPO="pupilleagence-source/logo-declinaisons-releases"
          TAG="v${VERSION}"

          # Delete pre-existing release/tag with same version (idempotent re-runs)
          gh release delete "$TAG" --repo "$RELEASES_REPO" --yes --cleanup-tag 2>/dev/null || true

          # Create the release with both installers attached
          gh release create "$TAG" \
            --repo "$RELEASES_REPO" \
            --title "Logo Declinaisons ${VERSION}" \
            --notes "Logo Declinaisons v${VERSION}

          ## Downloads

          - **macOS**: \`LogoDeclinaisons-${VERSION}-mac.pkg\` — signed & notarized for macOS 10.15+
          - **Windows**: \`LogoDeclinaisons-${VERSION}-windows.exe\` — Inno Setup installer

          ## Installation

          - **macOS**: double-click the .pkg and follow the installer
          - **Windows**: run the .exe as Administrator

          The extension will appear in Adobe Illustrator under *Window > Extensions > Logo Déclinaisons*." \
            artifacts/mac/*.pkg \
            artifacts/windows/*.exe
